<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="GuYi Tools - CSS/JS/HTML代码混淆与加密工坊">
    <title>GuYi Tools -幻想工坊</title>

    <link rel="icon" href="https://q.qlogo.cn/headimg_dl?dst_uin=156440000&spec=640&img_type=jpg">

    <!-- 预连接，加速字体加载 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body class="antialiased overflow-x-hidden text-white font-sans selection:bg-pink-500 selection:text-white">

    <!-- 背景层 -->
    <div class="fixed inset-0 z-[-1]" aria-hidden="true">
        <!-- 移动端背景图 -->
        <div class="absolute inset-0 bg-cover bg-center md:hidden"
             style="background-image: url('https://youke.xn--y7xa690gmna.cn/s1/2026/01/31/697d0c2eac82f.webp');"></div>
        <!-- 桌面端背景图 -->
        <div class="absolute inset-0 bg-cover bg-center hidden md:block"
             style="background-image: url('https://youke.xn--y7xa690gmna.cn/s1/2026/01/31/697d0960f2497.webp');"></div><!-- 遮罩 -->
        <div class="absolute inset-0 bg-gradient-to-t from-black/40 via-transparent to-black/20 pointer-events-none"></div>
    </div>

    <!-- 应用挂载点 -->
    <div id="app" class="relative z-10 min-h-screen flex flex-col"></div>

    <!-- HTML 模板：放在这里，不参与渲染，由 JS 克隆使用 -->
    <template id="tpl-app">
        <!--顶部导航 -->
        <nav class="fixed top-0 w-full z-50 px-4 py-3 flex justify-between items-center">
            <div class="glass-panel px-3 py-1.5 flex items-center gap-2rounded-full border-white/30">
                <div class="w-8 h-8 rounded-full border border-white/40 overflow-hidden shadow-lg">
                    <img src="https://q.qlogo.cn/headimg_dl?dst_uin=156440000&spec=640&img_type=jpg"
                         alt="GuYi Studio头像"
                         class="w-full h-full object-cover">
                </div>
                <span class="font-bold text-white text-sm pr-1">
                    GuYi<span class="text-pink-300">Tool</span>
                </span>
            </div>

            <button type="button"
                    data-action="ui:toggleAbout"
                    aria-label="打开菜单"
                    class="glass-panel w-10 h-10 rounded-full flex items-center justify-center text-white active:scale-90 transition-transform">
                <i class="ph-bold ph-list text-lg" aria-hidden="true"></i>
            </button>
        </nav>

        <!-- 主界面 -->
        <main class="w-full max-w-6xl mx-auto pt-20 pb-32 px-4 md:px-8 grid grid-cols-1 lg:grid-cols-12 gap-6animate-[fadeInUp_0.6s_ease-out]">

            <!-- 左侧：编辑器 -->
            <section class="lg:col-span-8 flex flex-col gap-3 h-[calc(100vh-140px)] lg:h-[680px]">

                <!-- 移动端 Tab -->
                <div class="md:hidden glass-panel p-1 rounded-2xl flex sticky top-16 z-40backdrop-blur-xl" role="tablist" aria-label="代码类型">
                    <button type="button" role="tab" aria-selected="true"data-action="ui:switchMode:css"id="mobCss"
                            class="flex-1 py-2 rounded-xl text-xs font-bold text-white/70 transition-all">CSS</button>
                    <button type="button" role="tab" aria-selected="false" data-action="ui:switchMode:js"id="mobJs"
                            class="flex-1 py-2 rounded-xl text-xs font-bold text-white/70 transition-all">JS</button>
                    <button type="button" role="tab" aria-selected="false" data-action="ui:switchMode:html" id="mobHtml"
                            class="flex-1 py-2 rounded-xl text-xs font-bold text-white/70 transition-all">HTML</button>
                </div>

                <!-- 编辑器容器 -->
                <div class="glass-panel flex-1 flex flex-col relative overflow-hidden">
                    <!-- 工具栏 -->
                    <div class="flex items-center justify-between px-4 py-2 border-b border-white/10">
                        <div class="flex items-center gap-2">
                            <i class="ph-duotone ph-file-code text-pink-300" aria-hidden="true"></i>
                            <span id="editorTitle" class="text-xs font-mono font-bold text-white/90">style.css</span>
                        </div>
                        <div class="flex gap-1">
                            <button type="button"
                                    data-action="ui:triggerUpload"
                                    title="导入文件"
                                    aria-label="导入文件"
                                    class="p-2 hover:bg-white/20 rounded-lg transition-colors">
                                <i class="ph-bold ph-upload-simple" aria-hidden="true"></i>
                            </button>
                            <button type="button"
                                    data-action="ui:clear"
                                    title="清空内容"
                                    aria-label="清空内容"
                                    class="p-2 hover:bg-red-500/30 text-red-200 rounded-lg transition-colors">
                                <i class="ph-bold ph-trash" aria-hidden="true"></i>
                            </button>
                            <input type="file" id="fileInput" class="hidden" accept=".css,.js,.html,.htm">
                        </div>
                    </div>

                    <!-- 编辑区域 -->
                    <div class="relative flex-1 input-area m-2 overflow-hidden">
                        <textarea id="sourceInput"
                                  class="w-full h-full bg-transparent text-sm p-4 resize-none outline-none text-slate-200 placeholder-white/30 leading-relaxed"
                                  placeholder="//粘贴代码到这里..."
                                  spellcheck="false"
                                  aria-label="代码输入区域"
                                  autocomplete="off"
                                  autocorrect="off"
                                  autocapitalize="off"></textarea>

                        <!-- 处理中遮罩 -->
                        <div id="processingLayer"
                             class="absolute inset-0 bg-black/60 backdrop-blur-sm hidden items-center justify-center z-20 flex-col"
                             aria-live="polite"
                             aria-label="正在处理">
                            <div class="w-10 h-10 border-4 border-pink-400 border-t-transparent rounded-full animate-spin mb-3"></div>
                            <span class="text-xs font-bold text-white tracking-widest">PROCESSING</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 右侧：控制面板 -->
            <section class="lg:col-span-4 flex flex-col gap-4 h-full overflow-y-auto no-scrollbar pb-24">

                <!-- 桌面端 Tab -->
                <div class="hidden md:flex glass-panel p-1.5 rounded-2xl" role="tablist" aria-label="代码类型">
                    <button type="button" role="tab" aria-selected="true"  data-action="ui:switchMode:css"  id="deskCss"
                            class="flex-1 py-2 rounded-xl text-sm font-bold text-white/70 transition-all">CSS</button>
                    <button type="button" role="tab" aria-selected="false" data-action="ui:switchMode:js"   id="deskJs"
                            class="flex-1 py-2 rounded-xl text-sm font-bold text-white/70 transition-all">JS</button>
                    <button type="button" role="tab" aria-selected="false" data-action="ui:switchMode:html" id="deskHtml"
                            class="flex-1 py-2 rounded-xl text-sm font-bold text-white/70 transition-all">HTML</button>
                </div>

                <!-- 设置卡片 -->
                <div class="glass-panel p-5 flex flex-col gap-4">
                    <div class="flex justify-between items-end border-b border-white/10pb-2">
                        <h3 class="text-sm font-bold text-white">配置选项</h3>
                        <span id="sizeStat" class="text-xs font-mono text-pink-300" aria-label="文件大小">0 B</span>
                    </div>

                    <!-- 动态设置区域 -->
                    <div id="settingsContainer" class="flex flex-col gap-3min-h-[100px]"></div>

                    <!-- 输出文件名 -->
                    <div class="pt-2">
                        <label for="fileName" class="sr-only">输出文件名</label>
                        <div class="relative">
                            <input type="text"
                                   id="fileName"
                                   value="bundle"
                                   aria-label="输出文件名"
                                   class="w-full bg-black/30 border border-white/20 rounded-xl px-4 py-3 text-sm text-white focus:border-pink-400 focus:bg-black/50 outline-none transition-all placeholder-white/30">
                            <span id="fileExt" class="absolute right-4 top-3.5 text-xs text-white/50 font-mono" aria-hidden="true">.css</span>
                        </div>
                    </div>
                </div>

                <!--桌面端构建按钮 -->
                <button type="button"
                        data-action="core:generate"
                        class="hidden md:flex btn-primary w-full py-4 rounded-2xl text-white font-bold text-lg items-center justify-center gap-2 transition-all hover:scale-[1.02]">
                    <i class="ph-bold ph-magic-wand text-xl" aria-hidden="true"></i>
                    立即构建
                </button></section>
        </main>

        <!-- 移动端底部悬浮操作条 -->
        <div class="md:hidden fixed bottom-6 left-4 right-4 z-50 safe-pb">
            <div class="glass-panel p-2 pl-5 pr-2 rounded-full flex items-center justify-between shadow-2xl bg-black/40 backdrop-blur-xl border-white/30">
                <div class="flex flex-col">
                    <span class="text-[9px] text-white/60 uppercase font-bold tracking-wider">Estimated Size</span>
                    <span id="mobileSizeStat" class="text-xs font-mono font-bold text-white" aria-label="预估大小">0 B</span>
                </div>
                <button type="button"
                        data-action="core:generate"
                        class="btn-primary py-2.5 px-6 rounded-full text-white font-bold text-sm shadow-lg active:scale-95 transition-transform flex items-center gap-2">
                    <i class="ph-bold ph-lightning" aria-hidden="true"></i>
                    生成
                </button>
            </div>
        </div>

        <!-- Toast 通知 -->
        <div id="toast"
             role="status"
             aria-live="polite"
             class="fixed top-24 left-1/2 -translate-x-1/2 opacity-0 pointer-events-none transition-all duration-300 z-[70] -translate-y-4">
            <div class="glass-panel px-6 py-3 rounded-full flex items-center gap-3 bg-black/60 border-pink-400/50 shadow-2xl">
                <i class="ph-fill ph-check-circle text-pink-400" id="toastIcon" aria-hidden="true"></i>
                <span class="text-sm font-bold text-white" id="toastMsg">操作成功</span>
            </div>
        </div>

        <!-- 关于弹窗 -->
        <div id="aboutModal" class="fixed inset-0 z-[80] hidden" role="dialog" aria-modal="true" aria-label="关于 GuYi Studio">
            <div class="absolute inset-0 bg-black/10 backdrop-blur-[2px] opacity-0 transition-opacity"
                 id="modalBg"
                 data-action="ui:toggleAbout"></div>
            <div class="absolute bottom-0 w-full glass-panel rounded-b-none rounded-t-[30px] p-8 transform translate-y-full transition-transform duration-300 md:top-1/2 md:bottom-auto md:left-1/2 md:w-[380px] md:-translate-x-1/2md:-translate-y-1/2 md:rounded-[30px] border-t border-white/30 bg-black/60"
                 id="modalContent">
                <!-- 移动端拖拽把手 -->
                <div class="w-12 h-1.5 bg-white/20 rounded-full mx-auto mb-6 md:hidden" aria-hidden="true"></div>
                <div class="text-center">
                    <img src="https://q.qlogo.cn/headimg_dl?dst_uin=156440000&spec=640&img_type=jpg"
                         alt="GuYi Studio 头像"
                         class="w-20 h-20 rounded-full mx-auto mb-4 border-2 border-white/50 shadow-lg">
                    <h3 class="text-xl font-bold text-white">GuYi Studio</h3>
                    <p class="text-white/60 text-xs mt-1 mb-6font-mono">Version 3.6.1Crystal</p>

                    <button type="button"
                            data-action="utils:copy:1077643184"
                            aria-label="复制 QQ 群号1077643184"
                            class="w-full glass-panel p-4 rounded-2xl flex items-center justify-between hover:bg-white/10 active:scale-95 transition-all group">
                        <div class="flex items-center gap-3">
                            <i class="ph-duotone ph-users text-2xl text-pink-300" aria-hidden="true"></i>
                            <div class="text-left">
                                <div class="text-[10px] text-white/50 uppercase font-bold">Official Group</div>
                                <div class="text-base font-mono font-bold text-white">1077643184</div>
                            </div>
                        </div>
                        <i class="ph-bold ph-copy text-white/40 group-hover:text-white transition-colors" aria-hidden="true"></i>
                    </button>

                    <button type="button"
                            data-action="ui:toggleAbout"
                            class="mt-4 w-full py-2.5 rounded-2xl text-sm text-white/50 hover:text-white transition-colors">
                        关闭
                    </button>
                </div>
            </div>
        </div>
    </template>

    <script src="script.js"></script>
</body>
</html>
