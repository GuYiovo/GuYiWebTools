<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 核心：允许全屏铺满，适配刘海屏 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="GuYi Tools - CSS/JS/HTML代码混淆与加密工坊">
    
    <!-- === iOS Web App 专属适配 开始 === -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GuYi Tools">
    <link rel="apple-touch-icon" href="https://q.qlogo.cn/headimg_dl?dst_uin=156440000&spec=640&img_type=jpg">
    <!-- === iOS Web App 专属适配 结束 === -->

    <title>GuYi Tools</title>

    <link rel="icon" href="https://q.qlogo.cn/headimg_dl?dst_uin=156440000&spec=640&img_type=jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="antialiased overflow-x-hidden text-white font-sans selection:bg-pink-500 selection:text-white bg-black">

    <div class="fixed inset-0 z-[-1]" aria-hidden="true">
        <div class="absolute inset-0 bg-cover bg-center md:hidden" style="background-image: url('img/mod.png');"></div>
        <div class="absolute inset-0 bg-cover bg-center hidden md:block" style="background-image: url('img/PC.png');"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-black/60 pointer-events-none"></div>
    </div>

    <!-- 主容器：使用 dvh 适配 iOS 底部工具栏动态高度 -->
    <div id="app" class="relative z-10 min-h-[100dvh] flex flex-col"></div>

    <template id="tpl-app">
        <!-- 导航栏：CSS 中注入了 paddingTop 适配刘海 -->
        <nav id="topNav" class="fixed top-0 w-full z-50 px-4 py-3 flex justify-between items-center backdrop-blur-md bg-black/10">
            <div class="glass-panel px-3 py-1.5 flex items-center gap-2 rounded-full border-white/30 cursor-pointer hover:bg-white/10 transition-colors">
                <div class="w-8 h-8 rounded-full border border-white/40 overflow-hidden shadow-[0_0_10px_rgba(255,105,180,0.3)]">
                    <img src="https://q.qlogo.cn/headimg_dl?dst_uin=156440000&spec=640&img_type=jpg" alt="Logo" class="w-full h-full object-cover pointer-events-none">
                </div>
                <span class="font-bold text-white text-sm pr-1 tracking-wide pointer-events-none">
                    GuYi<span class="text-pink-400 drop-shadow-[0_0_5px_rgba(255,105,180,0.5)]">Tool</span>
                </span>
            </div>

            <button type="button" data-action="ui:toggleAbout" class="glass-panel w-10 h-10 rounded-full flex items-center justify-center text-white active:scale-90 hover:bg-white/10 transition-all shadow-lg">
                <i class="ph-bold ph-list text-lg"></i>
            </button>
        </nav>

        <!-- 主界面 -->
        <main id="mainContent" class="w-full max-w-7xl mx-auto px-4 md:px-8 flex flex-col lg:flex-row gap-6 lg:h-[100dvh] pb-32 animate-[fadeInUp_0.6s_ease-out]">
            <section class="lg:flex-[3] flex flex-col gap-3 h-[55dvh] lg:h-full lg:min-h-0">
                <div class="md:hidden glass-panel p-1 rounded-2xl flex sticky top-0 z-40 backdrop-blur-xl mt-2" id="mobTabs">
                    <button type="button" data-action="ui:switchMode:css" id="mobCss" class="flex-1 py-2 rounded-xl text-xs font-bold text-white/70 transition-all">CSS</button>
                    <button type="button" data-action="ui:switchMode:js" id="mobJs" class="flex-1 py-2 rounded-xl text-xs font-bold text-white/70 transition-all">JS</button>
                    <button type="button" data-action="ui:switchMode:html" id="mobHtml" class="flex-1 py-2 rounded-xl text-xs font-bold text-white/70 transition-all">HTML</button>
                </div>

                <div class="glass-panel flex-1 flex flex-col relative overflow-hidden shadow-2xl group transition-all duration-300 hover:shadow-[0_0_30px_rgba(255,105,180,0.15)]">
                    <div class="flex items-center justify-between px-5 py-3 border-b border-white/10 bg-black/20">
                        <div class="flex items-center gap-2">
                            <i class="ph-duotone ph-file-code text-pink-400 text-lg"></i>
                            <span id="editorTitle" class="text-sm font-mono font-bold text-white/90 tracking-wider">style.css</span>
                        </div>
                        <div class="flex gap-1.5">
                            <!-- 修复此处：将 ui:triggerUpload 更改为 core:triggerUpload -->
                            <button type="button" data-action="core:triggerUpload" title="导入文件" class="p-2 hover:bg-white/20 rounded-lg transition-all text-white/80 hover:text-white active:scale-90"><i class="ph-bold ph-upload-simple"></i></button>
                            <button type="button" data-action="ui:clear" title="清空内容" class="p-2 hover:bg-red-500/30 text-red-300 rounded-lg transition-all active:scale-90"><i class="ph-bold ph-trash"></i></button>
                            <input type="file" id="fileInput" class="hidden" accept=".css,.js,.html,.htm">
                        </div>
                    </div>

                    <div class="relative flex-1 input-area m-3 overflow-hidden rounded-xl">
                        <textarea id="sourceInput" class="w-full h-full bg-transparent text-[13px] p-5 resize-none outline-none text-slate-100 placeholder-white/20 leading-loose custom-scrollbar font-mono tracking-wide" placeholder="// 在此粘贴或拖拽代码文件..." spellcheck="false"></textarea>
                        <div id="processingLayer" class="absolute inset-0 bg-black/70 backdrop-blur-md hidden items-center justify-center z-20 flex-col transition-all">
                            <div class="w-12 h-12 border-4 border-pink-500 border-t-transparent rounded-full animate-spin mb-4 shadow-[0_0_15px_rgba(255,105,180,0.5)]"></div>
                            <span class="text-xs font-bold text-white tracking-[0.2em] animate-pulse">PROCESSING</span>
                        </div>
                    </div>
                </div>
            </section>

            <section class="lg:flex-[2] flex flex-col gap-4 h-full lg:overflow-hidden relative">
                <div class="hidden md:flex glass-panel p-1.5 rounded-2xl shrink-0 mt-2">
                    <button type="button" data-action="ui:switchMode:css" id="deskCss" class="flex-1 py-2.5 rounded-xl text-sm font-bold text-white/70 transition-all hover:text-white">CSS</button>
                    <button type="button" data-action="ui:switchMode:js" id="deskJs" class="flex-1 py-2.5 rounded-xl text-sm font-bold text-white/70 transition-all hover:text-white">JS</button>
                    <button type="button" data-action="ui:switchMode:html" id="deskHtml" class="flex-1 py-2.5 rounded-xl text-sm font-bold text-white/70 transition-all hover:text-white">HTML</button>
                </div>

                <div class="glass-panel p-5 flex flex-col gap-4 flex-1 lg:overflow-y-auto custom-scrollbar shadow-xl">
                    <div class="flex justify-between items-center border-b border-white/10 pb-3 sticky top-0 bg-black/10 backdrop-blur-md z-10 -mx-5 px-5 -mt-5 pt-5">
                        <h3 class="text-sm font-bold text-white flex items-center gap-2"><i class="ph-fill ph-sliders text-pink-400"></i>引擎配置</h3>
                        <span id="sizeStat" class="text-xs font-mono font-bold text-pink-300 bg-pink-500/10 px-2 py-1 rounded-md">0 B</span>
                    </div>
                    <div id="settingsContainer" class="flex flex-col gap-3 min-h-[100px]"></div>
                    <div class="pt-4 mt-auto">
                        <label class="text-xs font-bold text-white/60 mb-2 block pl-1">输出包名称</label>
                        <div class="relative group">
                            <input type="text" id="fileName" value="bundle" class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-sm text-white group-hover:border-white/30 focus:border-pink-500 focus:bg-black/60 outline-none transition-all placeholder-white/20 font-mono shadow-inner">
                            <span id="fileExt" class="absolute right-4 top-3.5 text-xs text-pink-400/80 font-mono font-bold pointer-events-none">.css</span>
                        </div>
                    </div>
                </div>

                <button type="button" data-action="core:generate" class="hidden md:flex btn-primary shrink-0 w-full py-4 rounded-2xl text-white font-bold text-lg items-center justify-center gap-2 transition-all hover:-translate-y-1 shadow-[0_10px_30px_-10px_rgba(255,105,180,0.6)] relative overflow-hidden group">
                    <div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
                    <i class="ph-bold ph-magic-wand text-xl relative z-10"></i><span class="tracking-widest relative z-10">开始构建</span>
                </button>
            </section>
        </main>

        <!-- 移动端底部悬浮构建条 (CSS注入 safe-area 适配底线) -->
        <div class="md:hidden fixed bottom-0 left-0 right-0 z-[60] pointer-events-none">
            <div class="absolute inset-0 bg-gradient-to-t from-black/90 to-transparent h-32 bottom-0"></div>
            <div id="bottomBar" class="absolute left-4 right-4 pointer-events-auto animate-[fadeInUp_0.5s_ease-out_0.2s_both]">
                <div class="glass-panel p-2 pl-5 pr-2 rounded-full flex items-center justify-between shadow-[0_10px_40px_rgba(0,0,0,0.5)] bg-black/50 backdrop-blur-2xl border-white/20">
                    <div class="flex flex-col">
                        <span class="text-[9px] text-white/50 uppercase font-black tracking-widest">Size</span>
                        <span id="mobileSizeStat" class="text-xs font-mono font-bold text-pink-300">0 B</span>
                    </div>
                    <button type="button" data-action="core:generate" class="btn-primary py-3 px-8 rounded-full text-white font-bold text-sm shadow-lg active:scale-95 transition-transform flex items-center gap-2 tracking-widest">
                        <i class="ph-bold ph-lightning"></i> 构建
                    </button>
                </div>
            </div>
        </div>

        <div id="toast" class="fixed top-24 left-1/2 -translate-x-1/2 opacity-0 pointer-events-none transition-all duration-300 z-[100] scale-95">
            <div class="glass-panel px-6 py-3 rounded-full flex items-center gap-3 bg-black/80 border-pink-500/40 shadow-[0_10px_30px_rgba(255,105,180,0.2)]">
                <i class="ph-fill ph-check-circle text-pink-400 text-lg" id="toastIcon"></i>
                <span class="text-sm font-bold text-white tracking-wide" id="toastMsg">操作成功</span>
            </div>
        </div>

        <div id="aboutModal" class="fixed inset-0 z-[80] hidden">
            <div class="absolute inset-0 bg-black/40 backdrop-blur-sm opacity-0 transition-opacity duration-300" id="modalBg" data-action="ui:toggleAbout"></div>
            <div class="absolute bottom-0 w-full glass-panel rounded-b-none rounded-t-[32px] p-8 pb-12 transform translate-y-full transition-transform duration-300 md:top-1/2 md:bottom-auto md:left-1/2 md:w-[400px] md:-translate-x-1/2 md:-translate-y-1/2 md:rounded-3xl md:pb-8 border border-white/10 bg-black/80 shadow-2xl safe-pb" id="modalContent">
                <div class="w-12 h-1.5 bg-white/20 rounded-full mx-auto mb-6 md:hidden"></div>
                <div class="text-center">
                    <div class="relative inline-block mb-4">
                        <img src="https://q.qlogo.cn/headimg_dl?dst_uin=156440000&spec=640&img_type=jpg" class="w-24 h-24 rounded-full border-2 border-pink-400/50 shadow-[0_0_20px_rgba(255,105,180,0.3)] object-cover">
                    </div>
                    <h3 class="text-2xl font-black text-white tracking-wide">GuYi Studio</h3>
                    <p class="text-pink-400/80 text-xs mt-1 mb-8 font-mono font-bold tracking-widest">VERSION 3.6.1</p>

                    <button type="button" data-action="utils:copy:1077643184" class="w-full glass-panel p-4 rounded-2xl flex items-center justify-between hover:bg-white/10 hover:border-pink-500/30 active:scale-[0.98] transition-all group cursor-pointer bg-black/40">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full bg-pink-500/20 flex items-center justify-center text-pink-400 group-hover:bg-pink-500 group-hover:text-white transition-colors">
                                <i class="ph-fill ph-users text-xl"></i>
                            </div>
                            <div class="text-left">
                                <div class="text-[10px] text-white/40 uppercase font-black tracking-wider">Official Group</div>
                                <div class="text-lg font-mono font-bold text-white drop-shadow-md">1077643184</div>
                            </div>
                        </div>
                        <i class="ph-bold ph-copy text-white/30 group-hover:text-pink-400 transition-colors"></i>
                    </button>
                </div>
            </div>
        </div>
    </template>
    <script src="script.js"></script>
</body>
</html>
